<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
  <h2>Login</h2>
  <form method="POST" action="/login">
    <label>
      Username:
      <input type="text" name="username" />
    </label>
    <br />
    <label>
      Password:
      <input type="password" name="password" />
    </label>
    <br />
    <button type="submit">Login</button>
  </form>
  <p style="color:red;">
    <!-- Display simple error when query contains ?error=1 -->
  </p>
  <script>
    if (location.search.includes('error=1')) {
      document.querySelector('p').textContent = 'Invalid credentials';
    }
  </script>
</body>
</html>
